<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Booker – Sign In</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#1C1B1F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Booker">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/md3.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card {
      background: var(--md-sys-color-surface-container-high);
      border-radius: var(--md-sys-shape-corner-extra-large);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-logo svg { width: 40px; height: 40px; fill: var(--md-sys-color-primary); }
    .login-logo span { font-size: 28px; font-weight: 500; }
    .login-title { font-size: 22px; font-weight: 400; margin-bottom: 8px; }
    .login-sub { font-size: 14px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 28px; }
    .error-banner {
      background: var(--md-sys-color-error-container);
      color: var(--md-sys-color-on-error-container);
      padding: 12px 16px;
      border-radius: var(--md-sys-shape-corner-medium);
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    .login-btn { width: 100%; justify-content: center; margin-top: 8px; }
    .field-icon-wrap { position: relative; }
    .field-icon-wrap .field { padding-right: 44px; }
    .field-icon-wrap .eye-btn {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant);
    }
    .field-icon-wrap .eye-btn svg { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24"><path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
      <span>Booker</span>
    </div>
    <h1 class="login-title">Sign in</h1>
    <p class="login-sub">Enter your credentials to access your library</p>

    <div class="error-banner" id="errorBanner"></div>

    <form id="loginForm">
      <div class="form-field">
        <label for="username">Username</label>
        <input id="username" class="field" type="text" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <div class="field-icon-wrap">
          <input id="password" class="field" type="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="eye-btn" id="eyeBtn" title="Show/hide password">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-filled login-btn" id="loginBtn">
        Sign in
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorBanner = document.getElementById('errorBanner');
    const loginBtn = document.getElementById('loginBtn');
    const eyeBtn = document.getElementById('eyeBtn');
    const passwordField = document.getElementById('password');

    eyeBtn.addEventListener('click', () => {
      const isHidden = passwordField.type === 'password';
      passwordField.type = isHidden ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in...';

      const username = document.getElementById('username').value.trim();
      const password = passwordField.value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          window.location.href = '/';
        } else {
          errorBanner.textContent = data.error || 'Login failed';
          errorBanner.style.display = 'block';
        }
      } catch (err) {
        errorBanner.textContent = 'Network error. Please try again.';
        errorBanner.style.display = 'block';
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
