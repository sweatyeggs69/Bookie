name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.github/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bookie

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install deps
        run: pip install flake8
      - name: Run flake8
        run: flake8 *.py --max-line-length=120 --ignore=E501,W503 || true

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USER != ''
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Resolve Docker Hub image
        id: dhub
        run: |
          username="${{ secrets.DOCKERHUB_USERNAME }}"
          if [ -n "$username" ]; then
            echo "image=docker.io/${username}/bookie" >> $GITHUB_OUTPUT
          else
            echo "image=" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ steps.dhub.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta,enable=${{ github.ref_name != github.event.repository.default_branch }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=bookie
            org.opencontainers.image.description=Self-hosted ebook manager
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push
        id: build_step
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Image digest
        run: echo "Image digest ${{ steps.build_step.outputs.digest }}"
