name: Build & Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/booker

jobs:
  # ── Lint & basic checks ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install flake8

      - name: Run flake8
        run: flake8 *.py --max-line-length=120 --ignore=E501,W503 || true

  # ── Build & Push ───────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to GitHub Container Registry ────────────
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Login to Docker Hub (optional) ────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOCKERHUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      # ── Resolve Docker Hub image name from secret ─────
      - name: Resolve Docker Hub image
        id: dhub
        run: |
          username="${{ secrets.DOCKERHUB_USERNAME }}"
          if [ -n "$username" ]; then
            echo "image=docker.io/${username}/booker" >> $GITHUB_OUTPUT
          else
            echo "image=" >> $GITHUB_OUTPUT
          fi

      # ── Extract metadata / tags ────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
            ${{ steps.dhub.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=Booker
            org.opencontainers.image.description=Self-hosted ebook manager with Material Design 3 dark UI
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      # ── Build and push ─────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── Output image digest ────────────────────────────
      - name: Image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

  # ── Create GitHub Release on tag ──────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGES.md
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%an)" >> CHANGES.md
          else
            echo "## Initial Release" > CHANGES.md
          fi
          cat CHANGES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGES.md
          generate_release_notes: true
